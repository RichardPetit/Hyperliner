<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperliner Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="title">Hyperliner</h1>
    <button type="button" id="help-btn" class="help-btn hidden" title="Comment jouer">?</button>
    <div id="tutorial-overlay" class="hidden">
        <div class="setup-panel tutorial-panel">
            <p id="tuto-step-indicator" class="tuto-step-indicator"></p>
            <h2 id="tuto-title" class="setup-title"></h2>
            <div id="tuto-body" class="tuto-body"></div>
            <div class="tuto-actions">
                <button type="button" id="tuto-prev-btn" class="menu-btn tuto-nav-btn">Précédent</button>
                <button type="button" id="tuto-skip-btn" class="menu-btn tuto-skip-btn">Passer</button>
                <button type="button" id="tuto-next-btn" class="start-game-btn tuto-nav-btn">Suivant</button>
            </div>
        </div>
    </div>
    <div id="setup-screen">
        <div class="setup-panel">
            <h2 class="setup-title">Choisissez votre véhicule</h2>
            <p class="setup-hint">Sélectionnez un vaisseau puis lancez la partie.</p>
            <button type="button" id="open-tuto-btn" class="menu-btn tuto-open-btn">Comment jouer ?</button>
            <div id="vehicle-choices" class="vehicle-choices"></div>
            <button type="button" id="start-game-btn" class="start-game-btn">Commencer la partie</button>
        </div>
    </div>
    <div id="game-ui" class="game-ui-hidden">
    <div id="main-layout">
        <div id="game-column">
            <div id="game-container"></div>
            <div id="controls"></div>
            <p class="controls-hint">Flèches du clavier pour vous déplacer</p>
            <div id="power-controls"></div>
        </div>
        <div id="side-panel">
            <div id="action-gauge"></div>
            <div id="vehicle-roster"></div>
        </div>
    </div>
    </div>
    <button type="button" id="toggle-results-btn" class="results-toggle hidden">Masquer le classement</button>
    <div id="end-screen" class="hidden">
        <div class="setup-panel end-panel">
            <h2 id="end-title" class="setup-title"></h2>
            <p id="end-subtitle" class="setup-hint"></p>
            <div id="end-leaderboard" class="end-leaderboard"></div>
            <div class="end-actions">
                <button type="button" id="replay-btn" class="start-game-btn">Rejouer</button>
                <button type="button" id="menu-btn" class="menu-btn">Changer de véhicule</button>
            </div>
        </div>
    </div>



    <script src="main.js"></script>
</body>
</html>
